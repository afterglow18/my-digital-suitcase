# ─────────────────────────────────────────────────────────────────────────────
# Codemagic CI/CD — My Digital Suitcase iOS build
# ─────────────────────────────────────────────────────────────────────────────
#
# REQUIRED — Codemagic → your app → Environment variables
# Group "signing":
#   APP_STORE_CONNECT_KEY_IDENTIFIER   (your key ID, e.g. 67K2T48W7Y)
#   APP_STORE_CONNECT_ISSUER_ID        (your issuer ID)
#   APP_STORE_CONNECT_PRIVATE_KEY      Full .p8 file contents (mark Secure)
#
# Group "build_env":
#   VITE_API_BASE_URL                  Your deployed API URL

workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mydigitalsuitcase.app
      xcode: latest
      node: 22
      groups:
        - signing
        - build_env
      vars:
        XCODE_SCHEME: App
        XCODE_PROJECT: artifacts/outfit-generator/ios/App/App.xcodeproj
        XCODE_WORKSPACE: artifacts/outfit-generator/ios/App/App.xcodeproj/project.xcworkspace
        COREPACK_ENABLE_STRICT: "0"
        BUNDLE_ID: com.mydigitalsuitcase.app
        TEAM_ID: 2A78MFVCJS
        PROFILE_NAME: My Digital Suitcase

    scripts:
      - name: Install pnpm and dependencies
        script: |
          corepack disable || true
          npm install -g pnpm@9 --force
          pnpm install --no-frozen-lockfile

      - name: Build web assets
        script: |
          cd artifacts/outfit-generator
          VITE_REVENUECAT_IOS_API_KEY=$VITE_REVENUECAT_IOS_API_KEY \
          pnpm vite build --config vite.capacitor.config.ts

      - name: Capacitor add iOS and sync
        script: |
          cd artifacts/outfit-generator
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Inject app icon
        script: |
          ICONSET="artifacts/outfit-generator/ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICONSET"
          sips -z 1024 1024 app-store/AppIcon-1024.png --out "$ICONSET/AppIcon-1024.png"
          cat > "$ICONSET/Contents.json" << 'EOF'
          {
            "images": [
              {
                "filename": "AppIcon-1024.png",
                "idiom": "universal",
                "platform": "ios",
                "size": "1024x1024"
              }
            ],
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          EOF

      - name: Share App scheme
        script: |
          SCHEMES_DIR="$XCODE_PROJECT/xcshareddata/xcschemes"
          mkdir -p "$SCHEMES_DIR"
          # If Capacitor created a shared scheme already, leave it; otherwise copy from userdata
          if [ ! -f "$SCHEMES_DIR/App.xcscheme" ]; then
            USER_SCHEME=$(find "$XCODE_PROJECT/xcuserdata" -name "App.xcscheme" 2>/dev/null | head -1)
            if [ -n "$USER_SCHEME" ]; then
              cp "$USER_SCHEME" "$SCHEMES_DIR/App.xcscheme"
            fi
          fi
          echo "Shared schemes:"
          ls -la "$SCHEMES_DIR"
          echo "Available targets/schemes:"
          xcodebuild -list -project "$XCODE_PROJECT"

      - name: Set build number and encryption declaration
        script: |
          cd artifacts/outfit-generator/ios/App
          agvtool new-version -all $BUILD_NUMBER
          # Declare no non-exempt encryption so TestFlight never asks
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" App/Info.plist
          # Required for Face ID usage
          /usr/libexec/PlistBuddy -c "Add :NSFaceIDUsageDescription string 'My Suitcase uses Face ID to protect your wardrobe.'" App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSFaceIDUsageDescription 'My Suitcase uses Face ID to protect your wardrobe.'" App/Info.plist
          # Required to access the camera
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'My Suitcase uses the camera so you can photograph clothing items for your wardrobe.'" App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'My Suitcase uses the camera so you can photograph clothing items for your wardrobe.'" App/Info.plist
          # Required to read photos from the library
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'My Suitcase reads your photo library so you can add existing photos to your wardrobe.'" App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'My Suitcase reads your photo library so you can add existing photos to your wardrobe.'" App/Info.plist
          # Required when camera capture saves a photo back to the library
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'My Suitcase saves captured photos to your library for easy access later.'" App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'My Suitcase saves captured photos to your library for easy access later.'" App/Info.plist

      - name: Re-apply provisioning profiles after cap sync
        script: |
          echo "=== Provisioning profiles on machine ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles directory found"
          echo "=== Certificates in keychain ==="
          security find-identity -v -p codesigning 2>/dev/null || echo "No signing identities found"
          echo "=== Running xcode-project use-profiles ==="
          xcode-project use-profiles \
            --project artifacts/outfit-generator/ios/App/App.xcodeproj \
            --verbose 2>&1 || true
          echo "=== Profiles after use-profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "Still no profiles"

      - name: Resolve Swift Package dependencies
        script: |
          cd artifacts/outfit-generator/ios/App
          xcodebuild \
            -resolvePackageDependencies \
            -workspace App.xcodeproj/project.xcworkspace \
            -scheme App

      - name: Xcode archive
        script: |
          cd artifacts/outfit-generator/ios/App
          xcodebuild \
            -workspace App.xcodeproj/project.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64 \
            DEVELOPMENT_TEAM=2A78MFVCJS \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="My Digital Suitcase AppStore" \
            -archivePath "$CM_BUILD_DIR/build/App.xcarchive" \
            archive

      - name: Export IPA
        script: |
          echo "=== Profiles on disk before export ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "EMPTY — no profiles directory"
          ls -la ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/ 2>/dev/null || echo "EMPTY — no Xcode profiles directory"
          echo "=== Export options plist ==="
          cat /Users/builder/export_options.plist 2>/dev/null || echo "export_options.plist not found, falling back to app-store/ExportOptions.plist"
          PLIST=/Users/builder/export_options.plist
          [ -f "$PLIST" ] || PLIST=app-store/ExportOptions.plist
          echo "=== Using plist: $PLIST ==="
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/App.xcarchive" \
            -exportOptionsPlist "$PLIST" \
            -exportPath "$CM_BUILD_DIR/build/ipa"

      - name: Upload to TestFlight
        script: |
          # Use the .p8 key file Codemagic already placed on this machine
          # for the Developer Portal integration (same key, same ID)
          KEY_FILE=$(find /Users/builder -name "AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" 2>/dev/null | head -1)
          if [ -z "$KEY_FILE" ]; then
            echo "Exact key not found, searching for any .p8..."
            KEY_FILE=$(find /Users/builder -name "AuthKey_*.p8" 2>/dev/null | head -1)
          fi
          if [ -z "$KEY_FILE" ]; then
            echo "ERROR: No .p8 key file found on machine"
            find /Users/builder -name "*.p8" 2>/dev/null || true
            exit 1
          fi
          echo "Using key file: $KEY_FILE"
          app-store-connect publish \
            --path "$CM_BUILD_DIR/build/ipa/App.ipa" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "@file:$KEY_FILE" \
            --testflight

    artifacts:
      - $CM_BUILD_DIR/build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
